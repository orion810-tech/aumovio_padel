<style>
  :root {
    --bg: #0a0a0a;

  @keyframes pop { 0%{transform:scale(0.96);opacity:0} 100%{transform:scale(1);opacity:1} }
  .pop-in { animation: pop 0.25s cubic-bezier(0.2, 0.8, 0.2, 1) both; }
  @keyframes rise { from{transform:translateY(10px);opacity:0} to{transform:translateY(0);opacity:1} }
  .rise-in { animation: rise 0.35s ease-out both; }

  .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 1rem); }

<body>
<div id="root"></div>
<script type="text/babel" data-presets="env,react">

// ╔══════════════════════════════════════════════════════════════╗
// ║ Configuración de sincronización                                ║
// ║                                                                ║
// ║ La app llama a /api/store (Netlify Function). Si la API no     ║
// ║ está disponible (ej. abriendo el HTML directamente, sin        ║
// ║ desplegar a Netlify), la app cae en modo local automáticamente.║
// ╚══════════════════════════════════════════════════════════════╝
const API_URL = "/api/store";
const API_TOKEN = "aumovio";          // debe coincidir con el TOKEN de store.mjs
const POLL_MS = 4000;                  // refresca cada 4s cuando la pestaña está visible

const { useState, useEffect, useMemo, useRef } = React;

// ============================================================
// LOCAL STORAGE (fallback)
// ============================================================
const K_AUTH = "aumovio_auth_v1";
const K_DATA = "aumovio_data_v2";

function lsGet(key, fallback) {
  try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : fallback; } catch { return fallback; }
}
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }
function lsDel(key) { try { localStorage.removeItem(key); } catch {} }

// ============================================================
// HELPERS
// ============================================================
const uid = () => Math.random().toString(36).slice(2, 10);

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function incPair(obj, a, b) {
  if (!obj[a]) obj[a] = {};
  if (!obj[b]) obj[b] = {};
  obj[a][b] = (obj[a][b] || 0) + 1;
  obj[b][a] = (obj[b][a] || 0) + 1;
}

function calcRoundsHistory(rounds) {
  const h = { partners: {}, opponents: {}, sitOuts: {} };
  rounds.forEach((r) => {
    r.matches.forEach((m) => {
      incPair(h.partners, m.teamA[0], m.teamA[1]);
      incPair(h.partners, m.teamB[0], m.teamB[1]);
      for (const a of m.teamA) for (const b of m.teamB) incPair(h.opponents, a, b);
    });
    (r.sittingOut || []).forEach((p) => { h.sitOuts[p] = (h.sitOuts[p] || 0) + 1; });
  });
  return h;
}

function calcStandings(players, rounds) {
  const stats = {};
  players.forEach((p) => {
    stats[p.id] = { id: p.id, name: p.name, points: 0, played: 0, won: 0, lost: 0, diff: 0 };
  });
  rounds.forEach((r) => {
    r.matches.forEach((m) => {
      if (m.scoreA == null || m.scoreB == null) return;
      const sA = Number(m.scoreA), sB = Number(m.scoreB);
      m.teamA.forEach((pid) => {
        if (!stats[pid]) return;
        stats[pid].points += sA; stats[pid].played += 1; stats[pid].diff += sA - sB;
        if (sA > sB) stats[pid].won++; else if (sA < sB) stats[pid].lost++;
      });
      m.teamB.forEach((pid) => {
        if (!stats[pid]) return;
        stats[pid].points += sB; stats[pid].played += 1; stats[pid].diff += sB - sA;
        if (sB > sA) stats[pid].won++; else if (sB < sA) stats[pid].lost++;
      });
    });
  });
  return Object.values(stats).sort((a, b) => {
    if (b.points !== a.points) return b.points - a.points;
    if (b.diff !== a.diff) return b.diff - a.diff;
    return b.won - a.won;
  });
}

function generateRound(players, courts, completedRounds) {
  if (players.length < 4) return null;
  const history = calcRoundsHistory(completedRounds);
  const maxPlay = courts * 4;
  let numPlay = Math.min(players.length, maxPlay);
  numPlay = Math.floor(numPlay / 4) * 4;
  if (numPlay < 4) return null;

  // Regla: nadie descansa dos veces seguidas. Los jugadores que descansaron en la
  // última ronda tienen prioridad ABSOLUTA para jugar esta. Solo se rompe la regla
  // si es matemáticamente imposible (más asientos de descanso que jugadores elegibles,
  // p.ej. config degenerada con >50% descansando).
  const lastRound = completedRounds.length ? completedRounds[completedRounds.length - 1] : null;
  const satOutLast = new Set(lastRound ? (lastRound.sittingOut || []) : []);

  const sorted = shuffle([...players]).sort((a, b) => {
    // 1) Prioridad a quien descansó la última ronda → juega esta
    const aLast = satOutLast.has(a.id) ? 1 : 0;
    const bLast = satOutLast.has(b.id) ? 1 : 0;
    if (aLast !== bLast) return bLast - aLast;
    // 2) Entre el resto, quien ha descansado más veces en total juega primero
    return (history.sitOuts[b.id] || 0) - (history.sitOuts[a.id] || 0);
  });
  const playing = sorted.slice(0, numPlay).map((p) => p.id);
  const sittingOut = sorted.slice(numPlay).map((p) => p.id);

  let best = null;
  let bestScore = Infinity;
  for (let t = 0; t < 1200; t++) {
    const sh = shuffle(playing);
    let score = 0;
    const matches = [];
    for (let i = 0; i < sh.length; i += 4) {
      const teamA = [sh[i], sh[i + 1]];
      const teamB = [sh[i + 2], sh[i + 3]];
      score += (history.partners[teamA[0]]?.[teamA[1]] || 0) * 1000;
      score += (history.partners[teamB[0]]?.[teamB[1]] || 0) * 1000;
      for (const a of teamA) for (const b of teamB) score += history.opponents[a]?.[b] || 0;
      matches.push({ id: uid(), court: i / 4 + 1, teamA, teamB, scoreA: null, scoreB: null });
    }
    if (score < bestScore) { bestScore = score; best = matches; if (bestScore === 0) break; }
  }
  return { id: uid(), matches: best, sittingOut, completed: false };
}

function buildArchived(active) {
  if (!active) return null;
  const standings = calcStandings(active.players, active.rounds);
  return {
    id: active.id,
    name: active.name,
    startedAt: active.startedAt,
    finishedAt: Date.now(),
    players: active.players,
    courts: active.courts,
    rounds: active.rounds,
    standings,
    winner: standings[0] || null,
  };
}

function formatDate(ts) {
  if (!ts) return "—";
  return new Date(ts).toLocaleDateString("es-ES", { day: "2-digit", month: "short", year: "numeric" });
}
function defaultName() {
  const d = new Date();
  return "Torneo " + d.toLocaleDateString("es-ES", { day: "2-digit", month: "short" });
}

// ============================================================
// DATA STORE — capa de abstracción Netlify Blobs / localStorage
// ============================================================
function createDataStore() {
  const store = {
    mode: "init",                                       // 'init' | 'netlify' | 'local' | 'error'
    synced: false,
    state: { active: null, history: [], updatedAt: 0 },
    listeners: new Set(),
    pollTimer: null,
    visibilityHandler: null,
    lastError: null,
    inFlight: 0,                                        // contador de escrituras pendientes (queue depth)
    _writeChain: Promise.resolve(),                     // cadena de promesas para serializar POSTs

    subscribe(cb) {
      this.listeners.add(cb);
      cb(this.snapshot());
      return () => this.listeners.delete(cb);
    },
    notify() {
      const snap = this.snapshot();
      this.listeners.forEach((cb) => cb(snap));
    },
    snapshot() {
      return { ...this.state, mode: this.mode, synced: this.synced, lastError: this.lastError };
    },

    async init() {
      try {
        const state = await this.apiGet();
        this.state = state;
        this.mode = "netlify";
        this.synced = true;
        this.lastError = null;
        this.startPolling();
      } catch (e) {
        console.warn("[Aumovio] API no disponible, modo local:", e.message);
        this.mode = "local";
        this.lastError = e.message;
        this.initLocal();
        this.synced = true;
      }
      this.notify();
    },

    initLocal() {
      const saved = lsGet(K_DATA, { active: null, history: [], updatedAt: 0 });
      this.state = saved;
    },
    persistLocal() {
      if (this.mode !== "netlify") lsSet(K_DATA, this.state);
    },

    startPolling() {
      const tick = async () => {
        if (this.inFlight > 0) return;                  // hay writes pendientes, no machacar
        if (document.hidden) return;
        try {
          const remote = await this.apiGet();
          // Comparar datos reales, no solo timestamps. Evita re-renders innecesarios
          // que pueden causar parpadeo en la UI cuando el servidor devuelve los mismos
          // datos pero con un updatedAt ligeramente posterior.
          const sameData =
            JSON.stringify(remote.active) === JSON.stringify(this.state.active) &&
            JSON.stringify(remote.history) === JSON.stringify(this.state.history);
          if (!sameData) {
            this.state = remote;
            this.lastError = null;
            this.notify();
          } else if (this.lastError) {
            this.lastError = null;
            this.notify();
          }
        } catch (e) {
          this.lastError = e.message;
          this.notify();
        }
      };
      this.pollTimer = setInterval(tick, POLL_MS);
      this.visibilityHandler = () => { if (!document.hidden) tick(); };
      document.addEventListener("visibilitychange", this.visibilityHandler);
    },

    async apiGet() {
      const r = await fetch(API_URL, {
        method: "GET",
        headers: { "X-Aumovio-Token": API_TOKEN },
        cache: "no-store",
      });
      if (!r.ok) throw new Error("HTTP " + r.status);
      return await r.json();
    },

    async apiPost(body) {
      const r = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json", "X-Aumovio-Token": API_TOKEN },
        body: JSON.stringify(body),
        cache: "no-store",
      });
      if (!r.ok) {
        const text = await r.text().catch(() => "");
        throw new Error("HTTP " + r.status + " " + text);
      }
      return await r.json();
    },

    // Centraliza la escritura: serializa los POSTs en una cadena para que nunca
    // se solapen, y NO sobrescribe el estado local con la respuesta (el optimistic
    // update ya tiene los datos correctos; el polling sincroniza cambios remotos).
    // Esto elimina los blips causados por respuestas que llegan fuera de orden.
    _enqueueWrite(buildBody, label) {
      if (this.mode !== "netlify") return Promise.resolve();
      this.inFlight++;
      const promise = this._writeChain.then(async () => {
        try {
          const body = typeof buildBody === "function" ? buildBody() : buildBody;
          await this.apiPost(body);
          if (this.lastError) { this.lastError = null; this.notify(); }
        } catch (e) {
          console.error("[Aumovio] " + label + ":", e);
          this.lastError = e.message;
          this.notify();
        }
      });
      this._writeChain = promise.finally(() => { this.inFlight--; });
      return this._writeChain;
    },

    // ============= writes =============
    setActive(updater) {
      const newActive = typeof updater === "function" ? updater(this.state.active) : updater;
      // Optimistic local update con timestamp local
      this.state = { ...this.state, active: newActive, updatedAt: Date.now() };
      this.notify();
      if (this.mode !== "netlify") { this.persistLocal(); return Promise.resolve(); }
      return this._enqueueWrite(
        () => ({ action: "set-active", active: this.state.active }),
        "setActive"
      );
    },

    archiveActiveTournament() {
      if (!this.state.active) return Promise.resolve();
      const archived = buildArchived(this.state.active);
      this.state = {
        ...this.state,
        active: null,
        history: [archived, ...this.state.history.filter((t) => t.id !== archived.id)],
        updatedAt: Date.now(),
      };
      this.notify();
      if (this.mode !== "netlify") { this.persistLocal(); return Promise.resolve(); }
      return this._enqueueWrite(
        { action: "archive", archived },
        "archive"
      );
    },

    deleteHistoryItem(id) {
      this.state = {
        ...this.state,
        history: this.state.history.filter((t) => t.id !== id),
        updatedAt: Date.now(),
      };
      this.notify();
      if (this.mode !== "netlify") { this.persistLocal(); return Promise.resolve(); }
      return this._enqueueWrite(
        { action: "delete-history", id },
        "deleteHistory"
      );
    },

    // Edita un torneo archivado (p.ej. corregir marcadores). Recalcula clasificación
    // y campeón automáticamente a partir de las rondas modificadas.
    updateHistoryItem(id, updater) {
      const current = this.state.history.find((t) => t.id === id);
      if (!current) return Promise.resolve();
      const draft = typeof updater === "function" ? updater(current) : updater;
      const standings = calcStandings(draft.players, draft.rounds);
      const updated = { ...draft, standings, winner: standings[0] || null };
      this.state = {
        ...this.state,
        history: this.state.history.map((t) => (t.id === id ? updated : t)),
        updatedAt: Date.now(),
      };
      this.notify();
      if (this.mode !== "netlify") { this.persistLocal(); return Promise.resolve(); }
      return this._enqueueWrite(
        { action: "update-history", tournament: updated },
        "updateHistory"
      );
    },

    resetAll() {
      this.state = { active: null, history: [], updatedAt: Date.now() };
      this.notify();
      if (this.mode !== "netlify") { lsDel(K_DATA); return Promise.resolve(); }
      return this._enqueueWrite(
        { action: "reset" },
        "reset"
      );
    },
  };
  return store;
}

const dataStore = createDataStore();

// ============================================================
// UI ATOMS
// ============================================================
function Logo({ size = "sm" }) {
  const dim = size === "lg" ? "w-10 h-10" : size === "md" ? "w-8 h-8" : "w-7 h-7";
  return (
    <div className="flex items-center gap-2">
      <div className={`relative ${dim} rounded-full bg-[var(--lime)] flex items-center justify-center`}>
        <div className="absolute inset-[3px] rounded-full border-2 border-[var(--bg)]" />
        <div className="absolute w-[60%] h-[1.5px] bg-[var(--bg)] rotate-[35deg]" />
      </div>
      <div className={`font-display font-bold tracking-tight leading-none ${size === "lg" ? "text-xl" : "text-[1.05rem]"}`}>
        AUMOVIO<span className="text-[var(--lime)]">.</span>
      </div>
    </div>
  );
}

function SectionLabel({ children, accent }) {
  return (
    <div className="flex items-center gap-2 mb-2">
      <span className="text-[10px] tracking-[0.2em] uppercase font-medium text-[var(--text-3)]">{children}</span>
      {accent && <span className="h-px flex-1 bg-[var(--border)]" />}
    </div>
  );
}

function SyncBadge({ mode, hasError }) {
  let cfg;
  if (hasError && mode === "netlify") {
    cfg = { dot: "var(--orange)", label: "Reintentando", pulse: true };
  } else {
    cfg = {
      init:     { dot: "var(--text-3)", label: "Conectando", pulse: true },
      netlify:  { dot: "var(--lime)",   label: "Sincronizado", pulse: false },
      local:    { dot: "var(--orange)", label: "Local",         pulse: false },
      error:    { dot: "var(--red)",    label: "Error sync",    pulse: false },
    }[mode] || { dot: "var(--text-3)", label: "—", pulse: false };
  }
  return (
    <div className="flex items-center gap-1.5">
      <span
        className={`w-1.5 h-1.5 rounded-full ${cfg.pulse ? "pulse-dot" : ""}`}
        style={{ background: cfg.dot }}
      />
      <span className="text-[10px] tracking-[0.15em] uppercase text-[var(--text-3)] font-mono">
        {cfg.label}
      </span>
    </div>
  );
}

function IconBtn({ onClick, label, children }) {
  return (
    <button onClick={onClick} aria-label={label}
      className="w-9 h-9 rounded-lg border border-[var(--border)] flex items-center justify-center text-[var(--text-2)] active:bg-[var(--surface-2)]">
      {children}
    </button>
  );
}

function BackHeader({ onBack, title, right }) {
  return (
    <header className="px-5 pt-5 pb-3 flex items-center justify-between sticky top-0 bg-[var(--bg)]/95 backdrop-blur z-30">
      <div className="flex items-center gap-3 min-w-0">
        <button onClick={onBack} aria-label="Volver"
          className="w-9 h-9 rounded-lg border border-[var(--border)] flex items-center justify-center text-[var(--text-2)] active:bg-[var(--surface-2)]">
          ←
        </button>
        <h1 className="font-display font-bold text-lg truncate">{title}</h1>
      </div>
      {right}
    </header>
  );
}

// ============================================================
// LOGIN
// ============================================================
function Login({ onLogin, syncMode, hasError }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [error, setError] = useState(false);
  const [show, setShow] = useState(false);
  const submit = (e) => {
    if (e) e.preventDefault();
    if (user.trim().toLowerCase() === "aumovio" && pass === "aumovio") {
      setError(false); onLogin();
    } else { setError(true); }
  };
  return (
    <div className="min-h-full flex flex-col p-5">
      <header className="pt-3 flex items-center justify-between">
        <Logo size="md" />
        <SyncBadge mode={syncMode} hasError={hasError}/>
      </header>
      <div className="flex-1 flex flex-col justify-center max-w-sm w-full mx-auto">
        <div className="mb-10">
          <h1 className="font-display text-[3rem] leading-[0.95] font-extrabold tracking-tight">
            Padel<br/><span className="text-[var(--lime)]">tournaments.</span>
          </h1>
          <p className="text-[var(--text-2)] mt-3">Inicia sesión para gestionar tus torneos.</p>
        </div>
        <form onSubmit={submit} className="space-y-3">
          <div>
            <SectionLabel>Usuario</SectionLabel>
            <input type="text" autoCapitalize="none" autoCorrect="off" autoComplete="username"
              value={user} onChange={(e) => { setUser(e.target.value); setError(false); }}
              placeholder="usuario"
              className="w-full bg-[var(--surface)] border border-[var(--border)] rounded-xl px-4 py-3.5 text-[15px] placeholder:text-[var(--text-3)] focus:border-[var(--lime)] focus:outline-none"/>
          </div>
          <div>
            <SectionLabel>Contraseña</SectionLabel>
            <div className="relative">
              <input type={show ? "text" : "password"} autoComplete="current-password"
                value={pass} onChange={(e) => { setPass(e.target.value); setError(false); }}
                placeholder="••••••••"
                className="w-full bg-[var(--surface)] border border-[var(--border)] rounded-xl px-4 py-3.5 pr-16 text-[15px] placeholder:text-[var(--text-3)] focus:border-[var(--lime)] focus:outline-none"/>
              <button type="button" onClick={() => setShow(!show)}
                className="absolute right-2 top-1/2 -translate-y-1/2 text-xs px-2 py-1 text-[var(--text-3)]">
                {show ? "ocultar" : "ver"}
              </button>
            </div>
          </div>
          {error && <div className="text-xs text-[var(--red)] px-1 pop-in">Credenciales incorrectas.</div>}
          <button type="submit"
            className="w-full py-4 rounded-xl bg-[var(--lime)] text-black font-display font-bold text-lg active:scale-[0.98] transition-transform tracking-tight mt-4">
            Entrar →
          </button>
        </form>
      </div>
      <footer className="text-center text-[var(--text-3)] text-[11px] mt-6">Aumovio Padel · v1.6</footer>
    </div>
  );
}

// ============================================================
// HOME
// ============================================================
function Home({ data, syncMode, hasError, onContinue, onNew, onHistory, onSettings }) {
  const active = data.active;
  return (
    <div className="min-h-full flex flex-col p-5">
      <header className="flex items-center justify-between mb-8">
        <Logo />
        <div className="flex items-center gap-3">
          <SyncBadge mode={syncMode} hasError={hasError}/>
          <IconBtn onClick={onSettings} label="Ajustes">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="3"/>

// ============================================================
// SETUP
// ============================================================
function Setup({ onStart, onBack, hasActive, onArchiveActive }) {
  const [name, setName] = useState(defaultName());
  const [players, setPlayers] = useState([]);
  const [courts, setCourts] = useState(2);
  const [nameInput, setNameInput] = useState("");
  const inputRef = useRef();

  const addPlayer = () => {
    const n = nameInput.trim();
    if (!n) return;
    if (players.some((p) => p.name.toLowerCase() === n.toLowerCase())) { setNameInput(""); return; }
    setPlayers([...players, { id: uid(), name: n }]);
    setNameInput("");
    inputRef.current?.focus();
  };
  const removePlayer = (id) => setPlayers(players.filter((p) => p.id !== id));

  const canStart = players.length >= 4 && courts >= 1;
  const recommendedCourts = Math.max(1, Math.floor(players.length / 4));
  const isIdeal = players.length >= 4 && players.length % 4 === 0 && courts === players.length / 4;

  const startTournament = async () => {
    if (hasActive) {
      if (!confirm("Hay un torneo en curso. Se archivará automáticamente. ¿Continuar?")) return;
      await onArchiveActive();
    }
    onStart({ name: name.trim() || defaultName(), players, courts });
  };

  return (
    <div className="min-h-full flex flex-col">
      <BackHeader onBack={onBack} title="Nuevo torneo" />
      <div className="flex-1 px-5 pb-32 space-y-6">
        <section>
          <SectionLabel accent>Nombre</SectionLabel>
          <input value={name} onChange={(e) => setName(e.target.value)} placeholder="Nombre del torneo"
            className="w-full bg-[var(--surface)] border border-[var(--border)] rounded-xl px-4 py-3.5 text-[15px] placeholder:text-[var(--text-3)] focus:border-[var(--lime)] focus:outline-none"/>
        </section>

        <section>
          <SectionLabel accent>Jugadores · {players.length}</SectionLabel>
          <div className="flex gap-2">
            <input ref={inputRef} value={nameInput} onChange={(e) => setNameInput(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") addPlayer(); }} placeholder="Nombre del jugador"
              className="flex-1 bg-[var(--surface)] border border-[var(--border)] rounded-xl px-4 py-3.5 text-[15px] placeholder:text-[var(--text-3)] focus:border-[var(--lime)] focus:outline-none"/>
            <button onClick={addPlayer} disabled={!nameInput.trim()}
              className="px-5 rounded-xl bg-[var(--lime)] text-black font-semibold text-[15px] disabled:opacity-30 active:scale-95 transition-transform">
              Añadir
            </button>
          </div>
          {players.length > 0 && (
            <ul className="mt-3 space-y-1.5">
              {players.map((p, i) => (
                <li key={p.id} className="flex items-center justify-between bg-[var(--surface)] border border-[var(--border)] rounded-xl px-4 py-3 pop-in">
                  <div className="flex items-center gap-3 min-w-0">
                    <span className="font-mono text-[11px] text-[var(--text-3)] w-5">{String(i + 1).padStart(2, "0")}</span>
                    <span className="truncate">{p.name}</span>
                  </div>
                  <button onClick={() => removePlayer(p.id)}
                    className="text-[var(--text-3)] hover:text-[var(--red)] px-2 py-1 text-sm" aria-label="Eliminar">✕</button>
                </li>
              ))}
            </ul>
          )}
          {players.length > 0 && players.length < 4 && (
            <p className="mt-3 text-xs text-[var(--orange)]">Necesitas al menos 4 jugadores para empezar.</p>
          )}
        </section>

        <section>
          <SectionLabel accent>Pistas</SectionLabel>
          <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-4">
            <div className="flex items-center justify-between">
              <button onClick={() => setCourts(Math.max(1, courts - 1))}
                className="w-10 h-10 rounded-lg border border-[var(--border)] active:bg-[var(--surface-2)] text-lg">−</button>
              <div className="text-center">
                <div className="font-mono text-4xl font-bold leading-none">{courts}</div>
                <div className="text-[10px] tracking-[0.2em] uppercase text-[var(--text-3)] mt-2">{courts === 1 ? "pista" : "pistas"}</div>
              </div>
              <button onClick={() => setCourts(courts + 1)}
                className="w-10 h-10 rounded-lg border border-[var(--border)] active:bg-[var(--surface-2)] text-lg">+</button>
            </div>
          </div>
        </section>

        {players.length >= 4 && (
          <div className={`rounded-xl border px-4 py-3 text-xs leading-relaxed ${
            isIdeal ? "border-[var(--lime)]/30 bg-[var(--lime)]/5 text-[var(--lime)]"
                    : "border-[var(--border)] bg-[var(--surface)] text-[var(--text-2)]"
          }`}>
            {isIdeal ? (<>✓ Configuración óptima: nadie se sienta, todos juegan con todos.</>) : (
              <>Recomendado: <strong className="text-[var(--text)]">{recommendedCourts} pista{recommendedCourts !== 1 ? "s" : ""}</strong> con {players.length} jugadores
                {players.length % 4 !== 0 && (<> ({4 - (players.length % 4)} descansará{4 - (players.length % 4) !== 1 ? "n" : ""} por ronda)</>)}.</>
            )}
          </div>
        )}
      </div>
      <div className="fixed bottom-0 left-0 right-0 bg-gradient-to-t from-[var(--bg)] via-[var(--bg)] to-transparent pt-4 px-5 safe-bottom">
        <div className="max-w-md mx-auto">
          <button disabled={!canStart} onClick={startTournament}
            className="w-full py-4 rounded-xl bg-[var(--lime)] text-black font-display font-bold text-lg disabled:opacity-30 active:scale-[0.98] transition-transform tracking-tight">
            Iniciar torneo →
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// MATCH CARD (editing buffer para no romper la entrada con sync)
// ============================================================
function MatchCard({ match, players, onScoreChange }) {
  const getName = (id) => players.find((p) => p.id === id)?.name || "—";
  const hasScores = match.scoreA != null && match.scoreB != null;
  const winner = !hasScores ? null
    : Number(match.scoreA) > Number(match.scoreB) ? "A"
    : Number(match.scoreB) > Number(match.scoreA) ? "B" : "T";

  const [bufA, setBufA] = useState(match.scoreA == null ? "" : String(match.scoreA));
  const [bufB, setBufB] = useState(match.scoreB == null ? "" : String(match.scoreB));
  const [editing, setEditing] = useState({ A: false, B: false });

  useEffect(() => {
    if (!editing.A) setBufA(match.scoreA == null ? "" : String(match.scoreA));
  }, [match.scoreA, editing.A]);
  useEffect(() => {
    if (!editing.B) setBufB(match.scoreB == null ? "" : String(match.scoreB));
  }, [match.scoreB, editing.B]);

  const commitScore = (team, val) => {
    if (val === "") { onScoreChange(team, null); return; }
    const num = Math.max(0, parseInt(val, 10) || 0);
    onScoreChange(team, num);
  };

  return (
    <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl overflow-hidden rise-in">
      <div className="px-4 py-2.5 flex items-center justify-between border-b border-[var(--border)]">
        <div className="flex items-center gap-2">
          <span className="font-mono text-[10px] tracking-[0.15em] uppercase text-[var(--text-3)]">Pista</span>
          <span className="font-mono text-sm font-bold">{String(match.court).padStart(2, "0")}</span>
        </div>
        {hasScores && (
          <span className="text-[10px] tracking-[0.15em] uppercase font-medium text-[var(--lime)]">✓ registrado</span>
        )}
      </div>
      <div className="p-3 space-y-2">
        {["A", "B"].map((team) => {
          const tIds = team === "A" ? match.teamA : match.teamB;
          const isWinner = winner === team;
          const buf = team === "A" ? bufA : bufB;
          const setBuf = team === "A" ? setBufA : setBufB;
          return (
            <div key={team}
              className={`flex items-center gap-2 rounded-xl px-3 py-2.5 border transition-colors ${
                isWinner ? "bg-[var(--lime)]/8 border-[var(--lime)]/30" : "bg-[var(--surface-2)] border-transparent"
              }`}>
              <div className="flex-1 min-w-0">
                <div className="font-medium leading-tight truncate">
                  {getName(tIds[0])}<span className="text-[var(--text-3)] mx-1.5">·</span>{getName(tIds[1])}
                </div>
              </div>
              <input
                type="number" inputMode="numeric" min="0"
                value={buf}
                onFocus={() => setEditing((e) => ({ ...e, [team]: true }))}
                onChange={(e) => setBuf(e.target.value)}
                onBlur={() => {
                  setEditing((e) => ({ ...e, [team]: false }));
                  commitScore(team, buf);
                }}
                onKeyDown={(e) => { if (e.key === "Enter") e.target.blur(); }}
                placeholder="—"
                className={`w-16 text-center font-mono text-2xl font-bold bg-transparent border rounded-lg py-1 outline-none transition-colors ${
                  isWinner ? "text-[var(--lime)] border-[var(--lime)]/40"
                           : "text-[var(--text)] border-[var(--border)] focus:border-[var(--text-2)]"
                }`}/>
            </div>
          );
        })}
      </div>
    </div>
  );
}

      <div className="flex items-center justify-between gap-2 px-1">

          className="w-10 h-10 rounded-xl border border-[var(--border)] flex items-center justify-center text-lg text-[var(--text-2)] disabled:opacity-25 active:bg-[var(--surface-2)]"
          aria-label="Ronda anterior">←</button>
        <div className="text-center flex-1">
          <div className={`text-[10px] tracking-[0.25em] uppercase mb-0.5 ${isCurrent ? "text-[var(--lime)]" : "text-[var(--text-3)]"}`}>
            {isCurrent ? "En curso" : "Finalizada · editable"}
          </div>

            <span className="text-[var(--text-3)] font-mono text-base"> / {String(totalRounds).padStart(2, "0")}</span>
          </h2>
        </div>
        <button onClick={onNext} disabled={roundNum >= totalRounds}
          className="w-10 h-10 rounded-xl border border-[var(--border)] flex items-center justify-center text-lg text-[var(--text-2)] disabled:opacity-25 active:bg-[var(--surface-2)]"

      <div className="space-y-3">
        {round.matches.map((m) => (

// STANDINGS

function Standings({ players, rounds, compact }) {
  const standings = useMemo(() => calcStandings(players, rounds), [players, rounds]);
  return (
    <div className="space-y-1">
      {standings.map((s, i) => {
        const isLeader = i === 0 && s.points > 0;
        return (
          <div key={s.id}
            className={`flex items-center gap-3 px-3 py-3 rounded-xl border transition-colors ${
              isLeader ? "bg-[var(--lime)]/8 border-[var(--lime)]/30" : "bg-[var(--surface)] border-[var(--border)]"
            }`}>
            <div className={`font-mono text-xs w-6 text-center ${isLeader ? "text-[var(--lime)] font-bold" : "text-[var(--text-3)]"}`}>
              {String(i + 1).padStart(2, "0")}
            </div>
            <div className="flex-1 min-w-0">
              <div className="font-medium truncate">{s.name}</div>
              {!compact && (
                <div className="text-[11px] text-[var(--text-3)] mt-0.5 font-mono">
                  {s.played} PJ · {s.won}V {s.lost}D · {s.diff > 0 ? "+" : ""}{s.diff}
                </div>
              )}
            </div>
            <div className="text-right">
              <div className={`font-mono text-2xl font-bold leading-none ${isLeader ? "text-[var(--lime)]" : "text-[var(--text)]"}`}>
                {s.points}
              </div>
              {!compact && <div className="text-[10px] uppercase tracking-wider text-[var(--text-3)] mt-1">pts</div>}
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ============================================================
// TOURNAMENT CONFIG — modal con pistas y jugadores
// ============================================================
function TournamentConfig({ players, courts, onAdd, onRemove, onCourtsChange, onClose }) {
  const [name, setName] = useState("");
  const inputRef = useRef();
  useEffect(() => { inputRef.current?.focus(); }, []);
  const add = () => {
    const t = name.trim();
    if (!t) return;
    if (players.some((p) => p.name.toLowerCase() === t.toLowerCase())) { setName(""); return; }
    onAdd(t); setName("");
  };
  // Confirma: si hay un nombre tecleado pendiente, lo añade antes de cerrar
  const accept = () => {
    const t = name.trim();
    if (t && !players.some((p) => p.name.toLowerCase() === t.toLowerCase())) {
      onAdd(t);
    }
    onClose();
  };
  const recommendedCourts = Math.max(1, Math.floor(players.length / 4));
  const isIdeal = players.length >= 4 && players.length % 4 === 0 && courts === players.length / 4;
  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/60 backdrop-blur-sm pop-in" onClick={onClose}>
      <div className="w-full max-w-md bg-[var(--surface)] border-t border-[var(--border)] rounded-t-3xl flex flex-col max-h-[85vh]" onClick={(e) => e.stopPropagation()}>

        {/* HEADER fijo */}
        <div className="px-5 pt-5 pb-3 flex items-center justify-between shrink-0">
          <h3 className="font-display font-bold text-xl">Configuración</h3>
          <button onClick={onClose} className="text-[var(--text-3)] text-xl px-2" aria-label="Cerrar">✕</button>
        </div>

        {/* CONTENIDO scrollable */}
        <div className="px-5 pb-2 flex-1 overflow-y-auto">
          {/* Pistas */}
          <SectionLabel>Pistas</SectionLabel>
          <div className="bg-[var(--surface-2)] border border-[var(--border)] rounded-xl p-3 mb-2">
            <div className="flex items-center justify-between">
              <button onClick={() => onCourtsChange(Math.max(1, courts - 1))}
                className="w-10 h-10 rounded-lg border border-[var(--border)] active:bg-[var(--surface)] text-lg" aria-label="Una pista menos">−</button>
              <div className="text-center">
                <div className="font-mono text-3xl font-bold leading-none">{courts}</div>
                <div className="text-[10px] tracking-[0.2em] uppercase text-[var(--text-3)] mt-1.5">
                  {courts === 1 ? "pista" : "pistas"}
                </div>
              </div>
              <button onClick={() => onCourtsChange(courts + 1)}
                className="w-10 h-10 rounded-lg border border-[var(--border)] active:bg-[var(--surface)] text-lg" aria-label="Una pista más">+</button>
            </div>
          </div>
          <p className={`text-[11px] leading-relaxed mb-5 ${isIdeal ? "text-[var(--lime)]" : "text-[var(--text-3)]"}`}>
            {isIdeal
              ? "✓ Configuración óptima: nadie se sienta, todos juegan con todos."
              : players.length >= 4
                ? `Recomendado: ${recommendedCourts} pista${recommendedCourts !== 1 ? "s" : ""} con ${players.length} jugadores${players.length % 4 !== 0 ? ` (${4 - (players.length % 4)} descansa${4 - (players.length % 4) !== 1 ? "n" : ""} por ronda)` : ""}.`
                : "Añade al menos 4 jugadores."}
          </p>

          {/* Jugadores */}
          <SectionLabel>Jugadores · {players.length}</SectionLabel>
          <div className="flex gap-2 mb-3">
            <input ref={inputRef} value={name} onChange={(e) => setName(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter") add(); }} placeholder="Nuevo jugador"
              className="flex-1 bg-[var(--surface-2)] border border-[var(--border)] rounded-xl px-4 py-3 focus:border-[var(--lime)] focus:outline-none"/>
            <button onClick={add} disabled={!name.trim()}
              className="px-5 rounded-xl bg-[var(--lime)] text-black font-semibold disabled:opacity-30 active:scale-95 transition-transform">+</button>
          </div>
          <p className="text-xs text-[var(--text-3)] mb-3 leading-relaxed">Los cambios de pistas o jugadores se aplican a partir de la próxima ronda.</p>
          <ul className="space-y-1.5">
            {players.map((p, i) => (
              <li key={p.id} className="flex items-center justify-between bg-[var(--surface-2)] border border-[var(--border)] rounded-xl px-3 py-2.5">
                <div className="flex items-center gap-3">
                  <span className="font-mono text-[11px] text-[var(--text-3)] w-5">{String(i + 1).padStart(2, "0")}</span>
                  <span>{p.name}</span>
                </div>
                <button onClick={() => {
                  if (confirm(`¿Eliminar a ${p.name}? Sus puntos se mantienen, pero ya no jugará más rondas.`)) onRemove(p.id);
                }} className="text-[var(--text-3)] hover:text-[var(--red)] text-sm px-2" aria-label={`Eliminar ${p.name}`}>✕</button>
              </li>
            ))}
          </ul>
        </div>

        {/* FOOTER sticky con botón Aceptar */}
        <div className="px-5 pt-3 safe-bottom border-t border-[var(--border)] shrink-0 bg-[var(--surface)]">
          <button onClick={accept}
            className="w-full py-3.5 rounded-xl bg-[var(--lime)] text-black font-display font-bold text-lg active:scale-[0.98] transition-transform tracking-tight">
            Aceptar →
          </button>
        </div>

      </div>
    </div>
  );
}

// ============================================================
// ADMIN GATE — modal de confirmación con credenciales
// para acciones destructivas (borrar historial, reset total)
// ============================================================
function AdminGate({ title, message, onConfirm, onCancel }) {
  const [user, setUser] = useState("");
  const [pass, setPass] = useState("");
  const [error, setError] = useState(false);
  const [show, setShow] = useState(false);
  const userRef = useRef();
  useEffect(() => { userRef.current?.focus(); }, []);

  const submit = (e) => {
    if (e) e.preventDefault();
    if (user.trim().toLowerCase() === "admin" && pass === "padelrifa") {
      setError(false);
      onConfirm();
    } else {
      setError(true);
    }
  };

  return (
    <div className="fixed inset-0 z-50 flex items-end justify-center bg-black/70 backdrop-blur-sm pop-in" onClick={onCancel}>
      <div className="w-full max-w-md bg-[var(--surface)] border-t border-[var(--red)]/30 rounded-t-3xl p-5 safe-bottom" onClick={(e) => e.stopPropagation()}>

// ============================================================
// TOURNAMENT
// ============================================================
function Tournament({ active, setActive, onFinish, onBack, syncMode, hasError }) {
  const { players, courts, rounds, currentRoundIndex } = active;
  const [tab, setTab] = useState("round");
  const [showPlayers, setShowPlayers] = useState(false);
  const [viewRound, setViewRound] = useState(currentRoundIndex);

  // Cuando avanza la ronda actual (tras Terminar ronda), seguir a esa ronda.
  useEffect(() => { setViewRound(currentRoundIndex); }, [currentRoundIndex]);

  // Safety net: si por algún motivo la ronda actual no existe (datos viejos sincronizados,
  // estado corrupto), genérala. En el flujo normal esto NO se dispara porque endRound y
  // startNew ya generan la ronda atómicamente.
  useEffect(() => {
    if (rounds[currentRoundIndex]) return;            // ronda ya existe → no hacer nada
    const completed = rounds.slice(0, currentRoundIndex);
    const next = generateRound(players, courts, completed);
    if (!next) return;
    setActive((prev) => {
      if (!prev || prev.rounds[prev.currentRoundIndex]) return prev;
      return { ...prev, rounds: [...prev.rounds.slice(0, prev.currentRoundIndex), next] };
    });
  }, [currentRoundIndex, players.length]);

  const isCurrent = viewRound === currentRoundIndex;
  const round = rounds[viewRound];

  // Edita la ronda que se está viendo (puede ser una anterior). Las puntuaciones
  // de rondas pasadas son editables; al cambiarlas se recalcula la clasificación.
  const updateScore = (matchId, team, val) => {
    setActive((prev) => ({
      ...prev,
      rounds: prev.rounds.map((r, idx) => {
        if (idx !== viewRound) return r;
        return {
          ...r,
          matches: r.matches.map((m) =>
            m.id !== matchId ? m : (team === "A" ? { ...m, scoreA: val } : { ...m, scoreB: val })
          ),
        };
      }),
    }));
  };

  // ATÓMICO: marcar ronda actual como completada + incrementar índice + generar la
  // siguiente ronda en una sola transición de estado. Esto evita el race condition
  // que antes generaba blips (dos setActive en cascada → dos POSTs → respuestas
  // que se solapaban y la UI rebotaba).
  const endRound = () => {
    setActive((prev) => {
      const completedRounds = prev.rounds.map((r, idx) =>
        idx === prev.currentRoundIndex ? { ...r, completed: true } : r
      );
      const newIndex = prev.currentRoundIndex + 1;
      const nextRound = generateRound(
        prev.players,
        prev.courts,
        completedRounds.slice(0, newIndex)
      );
      const newRounds = nextRound ? [...completedRounds, nextRound] : completedRounds;
      return { ...prev, rounds: newRounds, currentRoundIndex: newIndex };
    });
    setTab("round");
    window.scrollTo({ top: 0, behavior: "smooth" });
  };

  const addPlayer = (name) => {
    setActive((prev) => ({ ...prev, players: [...prev.players, { id: uid(), name }] }));
  };
  const removePlayer = (id) => {
    setActive((prev) => ({ ...prev, players: prev.players.filter((p) => p.id !== id) }));
  };
  const setCourts = (newCourts) => {
    setActive((prev) => ({ ...prev, courts: Math.max(1, newCourts) }));
  };

  const matchesWithScores = round ? round.matches.filter((m) => m.scoreA != null && m.scoreB != null).length : 0;

  if (!round) {
    return (
      <div className="min-h-full flex flex-col">
        <BackHeader onBack={onBack} title={active.name} right={<SyncBadge mode={syncMode} hasError={hasError}/>}/>
        <div className="flex-1 flex items-center justify-center p-8 text-center">
          <div>
            <p className="text-[var(--text-2)] mb-4">No hay suficientes jugadores para generar una ronda.</p>
            <button onClick={() => setShowPlayers(true)}
              className="px-5 py-3 rounded-xl bg-[var(--lime)] text-black font-medium">Añadir jugadores</button>
            {showPlayers && (
              <TournamentConfig players={players} courts={courts}
                onAdd={addPlayer} onRemove={removePlayer} onCourtsChange={setCourts}
                onClose={() => setShowPlayers(false)}/>
            )}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="min-h-full flex flex-col">
      <BackHeader onBack={onBack} title={active.name}
        right={
          <div className="flex items-center gap-2">
            <SyncBadge mode={syncMode} hasError={hasError}/>
            <button onClick={() => setShowPlayers(true)}
              className="text-xs px-3 py-1.5 rounded-lg border border-[var(--border)] text-[var(--text-2)] active:bg-[var(--surface)] font-mono">
              {players.length}j · {courts}p
            </button>
          </div>
        }/>
      <div className="px-5">
        <div className="flex gap-1 bg-[var(--surface)] border border-[var(--border)] rounded-xl p-1">
          <button onClick={() => setTab("round")}
            className={`flex-1 py-2 rounded-lg text-sm font-medium transition-colors ${
              tab === "round" ? "bg-[var(--surface-2)] text-[var(--text)]" : "text-[var(--text-3)]"
            }`}>Ronda</button>
          <button onClick={() => setTab("table")}
            className={`flex-1 py-2 rounded-lg text-sm font-medium transition-colors ${
              tab === "table" ? "bg-[var(--surface-2)] text-[var(--text)]" : "text-[var(--text-3)]"
            }`}>Clasificación</button>
        </div>
      </div>

      <main className="flex-1 px-5 py-4 pb-32">
        {tab === "round" ? (
          <RoundView round={round} players={players} onScoreChange={updateScore}
            roundNum={viewRound + 1} totalRounds={currentRoundIndex + 1} isCurrent={isCurrent}
            onPrev={() => { setViewRound((v) => Math.max(0, v - 1)); window.scrollTo({ top: 0, behavior: "smooth" }); }}
            onNext={() => { setViewRound((v) => Math.min(currentRoundIndex, v + 1)); window.scrollTo({ top: 0, behavior: "smooth" }); }}
          />
        ) : (
          <div className="space-y-4">
            <div className="flex items-end justify-between px-1">
              <h2 className="font-display text-[2rem] leading-none font-extrabold tracking-tight">Clasificación</h2>
              <div className="text-right">
                <div className="text-[10px] tracking-[0.2em] uppercase text-[var(--text-3)]">Ronda</div>
                <div className="font-mono text-xl font-bold">{String(currentRoundIndex + 1).padStart(2, "0")}</div>
              </div>
            </div>
            <Standings players={players} rounds={rounds} />
          </div>
        )}
      </main>

      <div className="fixed bottom-0 left-0 right-0 bg-gradient-to-t from-[var(--bg)] via-[var(--bg)] to-transparent pt-4 px-5 safe-bottom z-20">
        <div className="max-w-md mx-auto space-y-2">
          {tab === "round" && isCurrent && (
            <>
              <div className="flex items-center justify-between text-xs text-[var(--text-3)] mb-1 px-1">
                <span><span className="text-[var(--text)] font-mono">{matchesWithScores}</span>/{round.matches.length} partidos registrados</span>
                <button onClick={() => { if (confirm("¿Finalizar el torneo y ver al campeón?")) onFinish(); }}
                  className="underline underline-offset-2 hover:text-[var(--text-2)]">Finalizar torneo</button>
              </div>
              <button onClick={endRound}
                className="w-full py-4 rounded-xl bg-[var(--lime)] text-black font-display font-bold text-lg active:scale-[0.98] transition-transform tracking-tight">
                Terminar ronda →
              </button>
            </>
          )}
          {tab === "round" && !isCurrent && (
            <>
              <div className="text-xs text-[var(--text-3)] mb-1 px-1 text-center">
                Editando una ronda finalizada · los cambios recalculan la clasificación
              </div>
              <button onClick={() => { setViewRound(currentRoundIndex); window.scrollTo({ top: 0, behavior: "smooth" }); }}
                className="w-full py-4 rounded-xl bg-[var(--surface)] border border-[var(--lime)]/40 text-[var(--lime)] font-display font-bold text-lg active:scale-[0.98] transition-transform tracking-tight">
                Ir a ronda actual →
              </button>
            </>
          )}
          {tab === "table" && (
            <button onClick={() => setTab("round")}
              className="w-full py-4 rounded-xl bg-[var(--surface)] border border-[var(--border)] font-medium">Volver a la ronda</button>
          )}
        </div>
      </div>

      {showPlayers && (
        <TournamentConfig players={players} courts={courts}
          onAdd={addPlayer} onRemove={removePlayer} onCourtsChange={setCourts}
          onClose={() => setShowPlayers(false)}/>
      )}
    </div>
  );
}

// HISTORY DETAIL (con edición protegida por admin)
// ============================================================
function HistoryDetail({ tournament, onBack, onDelete, onUpdate }) {
  const [tab, setTab] = useState("standings");
  const [askingDelete, setAskingDelete] = useState(false);
  const [askingEdit, setAskingEdit] = useState(false);
  const [editMode, setEditMode] = useState(false);
  const [nameDraft, setNameDraft] = useState("");

  if (!tournament) {
    return (
      <div className="min-h-full flex flex-col">
        <BackHeader onBack={onBack} title="Torneo" />
        <div className="flex-1 flex items-center justify-center p-8 text-center text-[var(--text-2)]">Torneo no encontrado.</div>
      </div>
    );
  }
  const getName = (id) => tournament.players.find((p) => p.id === id)?.name || "—";

  const enterEdit = () => { setNameDraft(tournament.name); setEditMode(true); setTab("rounds"); };

  // Edita el marcador de un partido dentro de una ronda del torneo archivado.
  const updateScore = (roundId, matchId, team, val) => {
    onUpdate(tournament.id, (t) => ({
      ...t,
      rounds: t.rounds.map((r) => {
        if (r.id !== roundId) return r;
        return {
          ...r,
          matches: r.matches.map((m) =>
            m.id !== matchId ? m : (team === "A" ? { ...m, scoreA: val } : { ...m, scoreB: val })
          ),
        };
      }),
    }));
  };

  const commitName = () => {
    const n = nameDraft.trim();
    if (n && n !== tournament.name) onUpdate(tournament.id, (t) => ({ ...t, name: n }));
  };

  return (
    <div className="min-h-full flex flex-col">
      <BackHeader onBack={onBack} title={editMode ? "Editando torneo" : tournament.name}
        right={
          editMode ? (
            <button onClick={() => setEditMode(false)}
              className="text-xs px-3 py-1.5 rounded-lg bg-[var(--lime)] text-black font-bold active:scale-95 transition-transform">Hecho</button>
          ) : (
            <div className="flex items-center gap-2">
              <button onClick={() => setAskingEdit(true)}
                className="text-xs px-3 py-1.5 rounded-lg border border-[var(--border)] text-[var(--text-2)] active:bg-[var(--surface)]">Editar</button>
              <button onClick={() => setAskingDelete(true)}
                className="text-xs px-3 py-1.5 rounded-lg border border-[var(--border)] text-[var(--red)] active:bg-[var(--surface)]">Eliminar</button>
            </div>
          )
        }/>
      <div className="px-5 pb-32 flex-1">

        {editMode && (
          <div className="mb-4">
            <SectionLabel accent>Nombre del torneo</SectionLabel>
            <input value={nameDraft} onChange={(e) => setNameDraft(e.target.value)} onBlur={commitName}
              onKeyDown={(e) => { if (e.key === "Enter") e.target.blur(); }}
              className="w-full bg-[var(--surface)] border border-[var(--border)] rounded-xl px-4 py-3 text-[15px] focus:border-[var(--lime)] focus:outline-none"/>
          </div>
        )}

        <div className="bg-[var(--surface)] border border-[var(--border)] rounded-2xl p-4 mb-4 grid grid-cols-3 gap-3 text-center">
          <div>
            <div className="text-[10px] tracking-[0.15em] uppercase text-[var(--text-3)]">Fecha</div>
            <div className="font-mono text-sm mt-1">{formatDate(tournament.startedAt)}</div>
          </div>
          <div>
            <div className="text-[10px] tracking-[0.15em] uppercase text-[var(--text-3)]">Jugadores</div>
            <div className="font-mono text-sm mt-1">{tournament.players.length}</div>
          </div>
          <div>
            <div className="text-[10px] tracking-[0.15em] uppercase text-[var(--text-3)]">Rondas</div>
            <div className="font-mono text-sm mt-1">{tournament.rounds.length}</div>
          </div>
        </div>
        {!editMode && tournament.winner && tournament.winner.points > 0 && (
          <div className="text-center my-4">
            <div className="text-[10px] tracking-[0.3em] uppercase text-[var(--text-3)] mb-2">Campeón</div>
            <div className="font-display font-extrabold text-3xl text-[var(--lime)] tracking-tight">{tournament.winner.name}</div>
            <div className="font-mono text-sm mt-1">
              {tournament.winner.points} <span className="text-[var(--text-3)] uppercase tracking-wider text-[10px]">pts</span>
            </div>
          </div>
        )}
        <div className="flex gap-1 bg-[var(--surface)] border border-[var(--border)] rounded-xl p-1 mb-4 mt-6">
          <button onClick={() => setTab("standings")} className={`flex-1 py-2 rounded-lg text-sm font-medium ${tab === "standings" ? "bg-[var(--surface-2)]" : "text-[var(--text-3)]"}`}>Clasificación</button>
          <button onClick={() => setTab("rounds")} className={`flex-1 py-2 rounded-lg text-sm font-medium ${tab === "rounds" ? "bg-[var(--surface-2)]" : "text-[var(--text-3)]"}`}>Rondas</button>
        </div>
        {tab === "standings" ? (
          <Standings players={tournament.players} rounds={tournament.rounds} />
        ) : (
          <div className="space-y-5">
            {editMode && (
              <div className="rounded-xl border border-[var(--lime)]/30 bg-[var(--lime)]/5 px-4 py-3 text-xs text-[var(--lime)] leading-relaxed">
                Modo edición: toca cualquier marcador para corregirlo. La clasificación y el campeón se recalculan al guardar.
              </div>
            )}
            {tournament.rounds.map((r, idx) => (
              <div key={r.id}>
                <div className="flex items-baseline justify-between mb-2 px-1">
                  <div className="font-display font-bold text-lg">
                    Ronda <span className="font-mono text-[var(--lime)]">{String(idx + 1).padStart(2, "0")}</span>
                  </div>
                  {r.sittingOut.length > 0 && (
                    <div className="text-xs text-[var(--text-3)]">Descansa: {r.sittingOut.map(getName).join(", ")}</div>
                  )}
                </div>
                {editMode ? (
                  <div className="space-y-3">
                    {r.matches.map((m) => (
                      <MatchCard key={m.id} match={m} players={tournament.players}
                        onScoreChange={(team, val) => updateScore(r.id, m.id, team, val)}/>
                    ))}
                  </div>
                ) : (
                  <div className="space-y-1.5">
                    {r.matches.map((m) => {
                      const hasScore = m.scoreA != null && m.scoreB != null;
                      const winA = hasScore && m.scoreA > m.scoreB;
                      const winB = hasScore && m.scoreB > m.scoreA;
                      return (
                        <div key={m.id} className="bg-[var(--surface)] border border-[var(--border)] rounded-xl px-3 py-2.5">
                          <div className="text-[10px] tracking-[0.15em] uppercase text-[var(--text-3)] mb-1 font-mono">Pista {String(m.court).padStart(2, "0")}</div>
                          <div className={`flex items-center justify-between ${winA ? "text-[var(--lime)]" : ""}`}>
                            <span className="truncate">{getName(m.teamA[0])} · {getName(m.teamA[1])}</span>
                            <span className="font-mono font-bold ml-2">{m.scoreA ?? "—"}</span>
                          </div>
                          <div className={`flex items-center justify-between ${winB ? "text-[var(--lime)]" : ""}`}>
                            <span className="truncate">{getName(m.teamB[0])} · {getName(m.teamB[1])}</span>
                            <span className="font-mono font-bold ml-2">{m.scoreB ?? "—"}</span>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>

      {editMode && (
        <div className="fixed bottom-0 left-0 right-0 bg-gradient-to-t from-[var(--bg)] via-[var(--bg)] to-transparent pt-4 px-5 safe-bottom z-20">
          <div className="max-w-md mx-auto">
            <button onClick={() => setEditMode(false)}
              className="w-full py-4 rounded-xl bg-[var(--lime)] text-black font-display font-bold text-lg active:scale-[0.98] transition-transform tracking-tight">
              Hecho →
            </button>
          </div>
        </div>
      )}

      {askingEdit && (
        <AdminGate
          title="Editar torneo archivado"
          message="Vas a editar un torneo del historial (nombre y marcadores). Introduce las credenciales de administrador para continuar."
          onConfirm={() => { setAskingEdit(false); enterEdit(); }}
          onCancel={() => setAskingEdit(false)}
        />
      )}

      {askingDelete && (
        <AdminGate
          title={`Eliminar "${tournament.name}"`}
          message="Esta acción borra el torneo del historial de forma permanente. Introduce las credenciales de administrador para confirmar."
          onConfirm={() => { setAskingDelete(false); onDelete(); }}
          onCancel={() => setAskingDelete(false)}
        />
      )}
    </div>
  );
}

  const syncCopy = {
    init:    { title: "Conectando…", desc: "Estableciendo conexión con el servidor." },
    netlify: { title: "Sincronización activa", desc: "Tus torneos se guardan en Netlify y se sincronizan automáticamente entre todos los dispositivos que usan esta URL." },
    local:   { title: "Modo local", desc: "Sin conexión al servidor. Los datos viven solo en este dispositivo. Despliega la app en Netlify para sincronizar entre dispositivos (ver README)." },
    error:   { title: "Error de sincronización", desc: lastError || "No se pudo conectar con el servidor. Los datos se están guardando localmente." },
  }[syncMode] || { title: "—", desc: "" };

  return (
    <div className="min-h-full flex flex-col">
      <BackHeader onBack={onBack} title="Ajustes" />
      <div className="px-5 pb-10 flex-1 space-y-3">

        <div className="rounded-2xl border border-[var(--border)] bg-[var(--surface)] p-5">
          <div className="flex items-center justify-between mb-2">
            <SyncBadge mode={syncMode}/>
          </div>
          <div className="font-display font-bold text-xl mt-1">{syncCopy.title}</div>
          <div className="text-xs text-[var(--text-2)] mt-2 leading-relaxed">{syncCopy.desc}</div>
          {lastError && syncMode === "netlify" && (
            <div className="mt-2 text-[11px] text-[var(--orange)] font-mono">{lastError}</div>
          )}
        </div>

        <button onClick={() => { if (confirm("¿Cerrar sesión en este dispositivo?")) onLogout(); }}
          className="w-full text-left rounded-2xl border border-[var(--border)] bg-[var(--surface)] p-5 active:bg-[var(--surface-2)] transition-colors">
          <div className="text-[10px] tracking-[0.25em] uppercase text-[var(--text-3)] mb-1 font-medium">Sesión</div>
          <div className="font-display font-bold text-xl">Cerrar sesión</div>
        </button>

        <div className="pt-6"><SectionLabel accent>Zona peligrosa</SectionLabel></div>

        <button onClick={() => setAskingAdmin(true)}
          className="w-full text-left rounded-2xl border border-[var(--red)]/30 bg-[var(--red)]/5 p-5 active:bg-[var(--red)]/10 transition-colors">
          <div className="text-[10px] tracking-[0.25em] uppercase text-[var(--red)] mb-1 font-medium">Irreversible · Requiere admin</div>
          <div className="font-display font-bold text-xl text-[var(--red)]">Borrar todos los datos</div>
          <div className="text-xs text-[var(--text-3)] mt-1">
            {syncMode === "netlify"
              ? "Elimina torneo actual + historial en el servidor (para todos los dispositivos) y cierra sesión local."
              : "Elimina torneo actual, historial local y cierra sesión."}
          </div>
        </button>
      </div>
      <footer className="text-center text-[var(--text-3)] text-[11px] pb-6">Aumovio Padel · v1.6</footer>

      {askingAdmin && (
        <AdminGate
          title="Borrar todos los datos"
          message={syncMode === "netlify"
            ? "Esto eliminará el torneo en curso y todo el historial en el servidor — afecta a todos los dispositivos. Acción irreversible. Introduce las credenciales de administrador."
            : "Esto eliminará el torneo en curso y todo el historial local. Acción irreversible. Introduce las credenciales de administrador."}
          onConfirm={() => { setAskingAdmin(false); onReset(); }}
          onCancel={() => setAskingAdmin(false)}
        />
      )}
    </div>
  );
}

// ============================================================
// ROOT APP
// ============================================================
function App() {
  const [storeState, setStoreState] = useState({ active: null, history: [], mode: "init", synced: false, lastError: null });
  const [hydrated, setHydrated] = useState(false);
  const [authed, setAuthed] = useState(false);
  const [view, setView] = useState("home");
  const [detailId, setDetailId] = useState(null);

  useEffect(() => {
    const unsub = dataStore.subscribe((snap) => {
      setStoreState(snap);
      if (snap.synced) setHydrated(true);
    });
    dataStore.init();
    const auth = lsGet(K_AUTH, { user: null });
    setAuthed(auth && auth.user === "aumovio");
    return unsub;
  }, []);

  const { active, history, mode: syncMode, lastError } = storeState;
  const hasError = !!lastError;

  const login = () => { lsSet(K_AUTH, { user: "aumovio" }); setAuthed(true); };
  const logout = () => { lsSet(K_AUTH, { user: null }); setAuthed(false); setView("home"); };

  const setActive = (updater) => dataStore.setActive(updater);

  const startNew = (config) => {
    // Genera la primera ronda inline para evitar un re-render extra del useEffect.
    const firstRound = generateRound(config.players, config.courts, []);
    dataStore.setActive({
      id: uid(),
      name: config.name,
      startedAt: Date.now(),
      phase: "tournament",
      players: config.players,
      courts: config.courts,
      rounds: firstRound ? [firstRound] : [],
      currentRoundIndex: 0,
    });
    setView("tournament");
  };

  const archiveCurrent = async () => { await dataStore.archiveActiveTournament(); };
  const archiveAndHome = async () => { await archiveCurrent(); setView("home"); };

  const finishTournament = () => {
    dataStore.setActive((prev) => prev ? { ...prev, phase: "finished" } : null);
    setView("finished");
  };
  const continuePlaying = () => {
    dataStore.setActive((prev) => prev ? { ...prev, phase: "tournament" } : null);
    setView("tournament");
  };

  const resetAll = async () => {
    await dataStore.resetAll();
    lsDel(K_AUTH);
    setAuthed(false);
    setView("home");
  };

  const deleteHistoryItem = async () => {
    await dataStore.deleteHistoryItem(detailId);
    setView("history"); setDetailId(null);
  };

  const updateHistoryItem = (id, updater) => dataStore.updateHistoryItem(id, updater);

  const continueActive = () => {
    if (!active) return;
    setView(active.phase === "finished" ? "finished" : "tournament");
  };

  if (!hydrated) {
    return (
      <div className="min-h-full flex items-center justify-center">
        <div className="flex items-center gap-3 text-[var(--text-3)] text-sm tracking-widest uppercase font-mono">
          <span className="w-2 h-2 rounded-full bg-[var(--lime)] pulse-dot"/>
          Cargando…
        </div>
      </div>
    );
  }

  if (!authed) {
    return (
      <div className="max-w-md mx-auto min-h-full bg-[var(--bg)]">
        <Login onLogin={login} syncMode={syncMode} hasError={hasError}/>
      </div>
    );
  }

  let content;
  switch (view) {
    case "home":
      content = <Home data={{ active, history }} syncMode={syncMode} hasError={hasError}
        onContinue={continueActive}
        onNew={() => setView("setup")}
        onHistory={() => setView("history")}
        onSettings={() => setView("settings")} />;
      break;
    case "setup":
      content = <Setup onStart={startNew} onBack={() => setView("home")}
        hasActive={!!active} onArchiveActive={archiveCurrent} />;
      break;
    case "tournament":
      if (!active) { setView("home"); content = null; break; }
      content = <Tournament active={active} setActive={setActive} syncMode={syncMode} hasError={hasError}
        onFinish={finishTournament} onBack={() => setView("home")} />;
      break;
    case "finished":
      if (!active) { setView("home"); content = null; break; }
      content = <Finished active={active} syncMode={syncMode} hasError={hasError}
        onArchiveAndExit={archiveAndHome} onContinue={continuePlaying} onBack={() => setView("home")} />;
      break;
    case "history":
      content = <HistoryList history={history} syncMode={syncMode} hasError={hasError}
        onSelect={(id) => { setDetailId(id); setView("history-detail"); }}
        onBack={() => setView("home")} />;
      break;
    case "history-detail":
      content = <HistoryDetail tournament={history.find((t) => t.id === detailId)}
        onBack={() => setView("history")} onDelete={deleteHistoryItem} onUpdate={updateHistoryItem} />;
      break;
    case "settings":
      content = <Settings onBack={() => setView("home")} onLogout={logout} onReset={resetAll}
        syncMode={syncMode} lastError={lastError}/>;
      break;
    default:
      content = <Home data={{ active, history }} syncMode={syncMode} hasError={hasError}
        onContinue={continueActive} onNew={() => setView("setup")}
        onHistory={() => setView("history")} onSettings={() => setView("settings")} />;
  }
  return <div className="max-w-md mx-auto min-h-full bg-[var(--bg)]">{content}</div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
